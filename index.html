<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ULLSWATER | TOTAL MIRROR SYSTEM</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root { --primary: #1a2a3a; --border: #000; --bg: #f0f2f5; }
        * { box-sizing: border-box; -webkit-print-color-adjust: exact; }
        
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; 
            background: var(--bg); margin: 0; padding: 10px;
        }
        
        .form-container { 
            width: 100%; max-width: 210mm; min-height: 297mm; background: white; 
            margin: 0 auto; padding: 10mm; border: 1px solid #ccc;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .header { display: flex; flex-wrap: wrap; justify-content: space-between; border-bottom: 4px solid var(--primary); padding-bottom: 15px; margin-bottom: 20px; gap: 15px; }
        .corp-title { font-weight: 900; font-size: 24px; width: 100%; border: none; color: var(--primary); text-transform: uppercase; outline: none; }
        
        #qrcode-container { border: 1px solid var(--border); padding: 5px; background: #fff; text-align: center; width: 180px; margin: 0 auto; }
        #qrcode img { width: 100%; height: auto; }
        .qr-label { font-size: 8px; font-weight: bold; margin-top: 4px; text-transform: uppercase; color: var(--primary); }

        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { border: 1px solid var(--border); padding: 8px; font-size: 11px; }
        .bg-blue { background: var(--primary); color: white; font-weight: bold; text-transform: uppercase; }
        
        input, textarea { width: 100%; border: none; outline: none; font-family: inherit; font-size: 12px; background: transparent; padding: 4px 0; }
        .table-wrapper { overflow-x: auto; -webkit-overflow-scrolling: touch; }

        .grand-total-row { background: #f2f2f2; font-weight: bold; font-size: 14px; }

        .footer-grid { display: grid; grid-template-columns: 1.5fr 1fr; gap: 20px; margin-top: 30px; }
        .notes-box { border: 1px solid var(--border); padding: 10px; min-height: 100px; }
        .sig-line { border-top: 2px solid var(--border); margin-top: 50px; padding-top: 5px; text-align: center; font-weight: bold; }

        .controls { width: 100%; max-width: 210mm; margin: 20px auto; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        button { padding: 12px; cursor: pointer; border: none; color: white; font-weight: bold; border-radius: 6px; font-size: 13px; }
        .btn-add { background: var(--primary); width: 100%; margin-top: 10px; grid-column: span 2; }

        @media print { 
            .controls, .btn-add, .action-col, .no-print { display: none !important; }
            body { background: white; padding: 0; }
            .form-container { border: none; box-shadow: none; margin: 0; padding: 5mm; width: 100%; }
        }
    </style>
</head>
<body>

<div class="form-container">
    <div class="header">
        <div style="flex: 1; min-width: 250px;">
            <input type="text" id="corpName" class="corp-title" value="ULLSWATER CORPORATION" oninput="saveData()">
            <input type="text" id="corpSub" value="OFFICIAL INVOICE" style="letter-spacing: 3px; font-weight: bold;" oninput="saveData()">
            <div style="margin-top: 15px; font-weight: bold; display: flex; align-items: center; gap: 5px;">
                INV: <input type="text" id="invNo" style="border-bottom: 2px solid var(--primary); font-weight: bold; color: #c0392b;" placeholder="AUTO-GENERATING..." oninput="saveData()">
            </div>
        </div>
        <div id="qrcode-container">
            <div id="qrcode"></div>
            <div class="qr-label">FULL DATA MIRROR</div>
        </div>
    </div>

    <table>
        <tr>
            <td width="50%"><strong>DATE:</strong> <input type="date" id="invDate" oninput="saveData()"></td>
            <td width="50%"><strong>CLIENT TIN:</strong> <input type="text" id="clientTin" placeholder="000-000-000-000" oninput="saveData()"></td>
        </tr>
        <tr>
            <td colspan="2">
                <strong>BILL TO:</strong>
                <textarea id="clientName" placeholder="Recipient Name & Address..." rows="3" oninput="saveData()" style="font-weight: bold;"></textarea>
            </td>
        </tr>
    </table>

    <div class="table-wrapper">
        <table id="invTable">
            <thead>
                <tr class="bg-blue">
                    <th width="12%">Source</th>
                    <th>Description</th>
                    <th width="10%">Qty</th>
                    <th width="15%">Price</th>
                    <th width="18%">Total</th>
                    <th class="action-col" width="40px"></th>
                </tr>
            </thead>
            <tbody id="invBody"></tbody>
            <tfoot>
                <tr class="grand-total-row">
                    <td colspan="4" style="text-align: right; padding-right: 15px;">GRAND TOTAL (PHP):</td>
                    <td id="grandTotal" style="text-align: center; color: var(--primary);">0.00</td>
                    <td class="action-col"></td>
                </tr>
            </tfoot>
        </table>
    </div>
    
    <button class="btn-add no-print" onclick="addRow()">+ ADD SERVICE/ITEM LINE</button>

    <div class="footer-grid">
        <div class="notes-box">
            <div style="font-size: 10px; font-weight: bold; color: #555; margin-bottom: 5px;">NOTES / TERMS / REMITTANCE:</div>
            <textarea id="invNotes" placeholder="Payment terms or footnotes..." oninput="saveData()"></textarea>
        </div>
        <div style="display: flex; flex-direction: column; justify-content: flex-end;">
            <div class="sig-line">
                <input type="text" id="signatoryName" value="AUTHORIZED SIGNATORY" style="text-align: center; font-weight: bold;" oninput="saveData()">
            </div>
        </div>
    </div>
</div>

<div class="controls no-print">
    <button style="background: #27ae60; grid-column: span 2;" onclick="window.print()">PRINT PDF</button>
    <button style="background: #8e44ad;" onclick="saveJSON()">SAVE JSON</button>
    <button style="background: #2980b9;" onclick="document.getElementById('bulkInput').click()">LOAD BULK FILES</button>
    <button style="background: #e67e22;" onclick="exportCSV()">EXPORT CSV</button>
    <button style="background: #c0392b;" onclick="clearForm()">RESET FORM</button>
    <input type="file" id="bulkInput" style="display:none" multiple onchange="loadBulk(event)">
</div>

<script>
    let qrTimeout;

    // --- AUTO GENERATE INVOICE NUMBER ---
    function generateInvNumber() {
        const now = new Date();
        const datePart = now.getFullYear() + String(now.getMonth() + 1).padStart(2, '0') + String(now.getDate()).padStart(2, '0');
        const randPart = Math.random().toString(36).substring(2, 5).toUpperCase();
        return `ULW-${datePart}-${randPart}`;
    }

    function addRow(src="", d="", q=1, p=0) {
        const tbody = document.getElementById('invBody');
        const tr = document.createElement('tr');
        tr.innerHTML = `
            <td><input type="text" class="src" value="${src}" style="text-align:center; text-transform:uppercase;"></td>
            <td><textarea class="desc" rows="1" oninput="this.style.height='auto';this.style.height=this.scrollHeight+'px';saveData()">${d}</textarea></td>
            <td><input type="number" class="qty" value="${q}" oninput="calc(); saveData()" style="text-align:center;"></td>
            <td><input type="number" class="price" value="${p}" oninput="calc(); saveData()" style="text-align:center;"></td>
            <td class="row-total" style="font-weight:bold; text-align:center;">0.00</td>
            <td class="action-col" style="text-align:center;"><button style="background:#c0392b; color:white; border-radius:4px; padding: 4px 8px;" onclick="this.parentElement.parentElement.remove(); calc(); saveData()">✕</button></td>
        `;
        tbody.appendChild(tr);
        calc();
    }

    function calc() {
        let grand = 0;
        document.querySelectorAll('#invBody tr').forEach(r => {
            let q = parseFloat(r.querySelector('.qty').value) || 0;
            let p = parseFloat(r.querySelector('.price').value) || 0;
            let total = q * p;
            r.querySelector('.row-total').innerText = total.toFixed(2);
            grand += total;
        });
        document.getElementById('grandTotal').innerText = grand.toLocaleString(undefined, {minimumFractionDigits: 2});
        updateQRCode();
    }

    function getFormData() {
        return {
            corp: document.getElementById('corpName').value,
            inv: document.getElementById('invNo').value,
            date: document.getElementById('invDate').value,
            tin: document.getElementById('clientTin').value,
            client: document.getElementById('clientName').value,
            notes: document.getElementById('invNotes').value,
            signatory: document.getElementById('signatoryName').value,
            total: document.getElementById('grandTotal').innerText,
            items: Array.from(document.querySelectorAll('#invBody tr')).map(r => ({
                src: r.querySelector('.src').value, 
                d: r.querySelector('.desc').value, 
                q: r.querySelector('.qty').value, 
                p: r.querySelector('.price').value, 
                total: r.querySelector('.row-total').innerText 
            }))
        };
    }

    function updateQRCode() {
        clearTimeout(qrTimeout);
        qrTimeout = setTimeout(() => {
            const d = getFormData();
            let mirror = `${d.corp}\nINV: ${d.inv}\nDATE: ${d.date}\nTIN: ${d.tin}\n`;
            mirror += `CLIENT: ${d.client.replace(/\n/g, ' ')}\n`;
            mirror += `---ITEMS---\n`;
            d.items.forEach(i => { mirror += `[${i.src}] ${i.d}: ${i.q}x${i.p}=${i.total}\n`; });
            mirror += `-----------\n`;
            mirror += `NOTES: ${d.notes.replace(/\n/g, ' ')}\n`;
            mirror += `TOTAL: PHP ${d.total}\n`;
            mirror += `SIG: ${d.signatory}`;

            const qrDiv = document.getElementById("qrcode");
            qrDiv.innerHTML = ""; 
            new QRCode(qrDiv, { text: mirror, width: 170, height: 170, correctLevel: QRCode.CorrectLevel.L });
        }, 1000);
    }

    function saveData() { 
        localStorage.setItem('ULLSWATER_SYSTEM_DATA', JSON.stringify(getFormData())); 
    }

    async function loadBulk(e) {
        for (const file of e.target.files) {
            try {
                const content = await file.text();
                const data = JSON.parse(content);
                applyData(data);
            } catch (err) { alert("Error loading: " + file.name); }
        }
    }

    function applyData(data) {
        document.getElementById('corpName').value = data.corp || "ULLSWATER CORPORATION";
        document.getElementById('invNo').value = data.inv || generateInvNumber(); // Respect saved ID or generate
        document.getElementById('invDate').value = data.date || "";
        document.getElementById('clientTin').value = data.tin || "";
        document.getElementById('clientName').value = data.client || "";
        document.getElementById('invNotes').value = data.notes || "";
        document.getElementById('signatoryName').value = data.signatory || "";
        document.getElementById('invBody').innerHTML = '';
        if (data.items) data.items.forEach(i => addRow(i.src, i.d, i.q, i.p));
        calc();
    }

    function saveJSON() {
        const d = getFormData();
        const blob = new Blob([JSON.stringify(d, null, 2)], { type: 'application/json' });
        const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `${d.inv || 'DRAFT'}.json`; a.click();
    }

    function exportCSV() {
        const d = getFormData();
        let csv = "CORP,INV,DATE,TIN,CLIENT,SRC,DESC,QTY,PRICE,LINE_TOTAL,GRAND_TOTAL\n";
        d.items.forEach(i => {
            csv += `"${d.corp}","${d.inv}","${d.date}","${d.tin}","${d.client.replace(/\n/g, ' ')}","${i.src}","${i.d}","${i.q}","${i.p}","${i.total}","${d.total}"\n`;
        });
        const blob = new Blob([csv], { type: 'text/csv' });
        const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `${d.inv}.csv`; a.click();
    }

    function clearForm() { 
        if(confirm("Permanently clear system data?")) { 
            localStorage.removeItem('ULLSWATER_SYSTEM_DATA'); 
            location.reload(); 
        } 
    }

    window.onload = () => {
        const saved = JSON.parse(localStorage.getItem('ULLSWATER_SYSTEM_DATA'));
        if(saved) {
            applyData(saved);
        } else {
            document.getElementById('invNo').value = generateInvNumber(); // Auto-generate for fresh start
            addRow(); 
            document.getElementById('invDate').valueAsDate = new Date(); 
        }
    };
</script>
</body>
</html>
